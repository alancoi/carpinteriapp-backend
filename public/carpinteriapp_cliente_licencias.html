<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CarpiteriAPP">
    <title>CarpiteriAPP - Sistema de Licencias</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        :root {
            --primary-blue: #0D47A1;
            --accent-orange: #FF8C00;
            --dark-bg: #0A0E27;
            --card-bg: #141B33;
            --card-bg-light: #1F2A47;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AEC0;
            --text-tertiary: #718096;
            --border: #2D3A52;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(180deg, #0A0E27 0%, #141B33 50%, #0A0E27 100%);
            color: var(--text-primary);
            position: fixed;
            overflow: hidden;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 2rem;
            background: linear-gradient(180deg, #0A0E27 0%, #141B33 100%);
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: linear-gradient(135deg, var(--card-bg-light) 0%, var(--card-bg) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0D47A1, #FF8C00);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-input {
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 20px rgba(255,140,0,0.2);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .btn-login {
            padding: 0.9rem;
            background: linear-gradient(135deg, #0D47A1, #FF8C00);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(13,71,161,0.3);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-message {
            padding: 0.75rem;
            background: rgba(239,68,68,0.2);
            border: 1px solid #EF4444;
            border-radius: 8px;
            color: #FECACA;
            font-size: 0.85rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .container.hidden {
            display: none;
        }

        .header {
            padding: 1rem 1.5rem;
            background: linear-gradient(180deg, rgba(13, 71, 161, 0.15) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0D47A1, #FF8C00);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .logo-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .header-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .btn-header {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-cambiar-pass {
            background: rgba(13, 71, 161, 0.2);
            border: 1px solid #3B82F6;
            color: #BFDBFE;
        }

        .btn-logout {
            background: rgba(239,68,68,0.2);
            border: 1px solid #EF4444;
            color: #FECACA;
        }

        .stats-box {
            background: linear-gradient(135deg, var(--card-bg-light) 0%, var(--card-bg) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0D47A1, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            -webkit-overflow-scrolling: touch;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 85%;
            padding: 1rem;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message.bot .message-content {
            background: linear-gradient(135deg, var(--card-bg-light) 0%, var(--card-bg) 100%);
            border: 1px solid var(--border);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #0D47A1, #FF8C00);
            color: white;
        }

        .chat-input-area {
            display: flex;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--card-bg-light) 0%, var(--card-bg) 100%);
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 0.75rem;
            font-size: 1rem;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
        }

        .btn-send {
            background: linear-gradient(135deg, #0D47A1, #FF8C00);
            color: white;
            border: none;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--card-bg-light) 0%, var(--card-bg) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }

        .modal-close {
            cursor: pointer;
            float: right;
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .modal-title {
            clear: both;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .user-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">🔨</div>
                <h1>CarpiteriAPP</h1>
                <p>Tu asistente profesional</p>
            </div>

            <div class="error-message" id="loginError"></div>

            <div class="login-form">
                <div class="form-group">
                    <label class="form-label">Email (Usuario)</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="••••••••">
                </div>
                <button class="btn-login" onclick="handleLogin()">Iniciar Sesión</button>
            </div>
        </div>
    </div>

    <!-- APP -->
    <div class="container hidden" id="mainApp">
        <div class="header">
            <div class="header-top">
                <div class="logo-section">
                    <div class="logo-icon">🔨</div>
                    <div>
                        <div style="font-size: 1.2rem; font-weight: 700;">CarpiteriAPP</div>
                        <div style="font-size: 0.7rem; color: var(--text-secondary);">CONECTADA</div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="user-info">
                        <div id="userName" style="font-weight: 600;"></div>
                        <div id="userPlan" style="font-size: 0.8rem; color: var(--accent-orange);"></div>
                    </div>
                    <div class="header-buttons">
                        <button class="btn-header btn-cambiar-pass" onclick="abrirCambiarPass()">🔑 Cambiar</button>
                        <button class="btn-header btn-logout" onclick="logout()">Salir</button>
                    </div>
                </div>
            </div>

            <div class="stats-box">
                <div class="stat">
                    <div class="stat-label">Usos Hoy</div>
                    <div class="stat-value" id="usosHoy">0/20</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Disponibles</div>
                    <div class="stat-value" id="usosRestantes">20</div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        <div class="message-content">
                            <strong>¡Hola! 👋</strong><br><br>
                            Soy tu asesor profesional de carpintería. Pregúntame lo que necesites.
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="Escribe tu pregunta..."
                        onkeypress="handleEnter(event)"
                    >
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modalCambiarPass" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="cerrarModal()">&times;</span>
            <h2 class="modal-title">Cambiar Contraseña</h2>

            <div class="error-message" id="cambiarPassError"></div>

            <div class="login-form">
                <div class="form-group">
                    <label class="form-label">Contraseña Actual</label>
                    <input type="password" id="passActual" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Nueva Contraseña</label>
                    <input type="password" id="passNueva" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmar</label>
                    <input type="password" id="passConfirm" class="form-input">
                </div>
                <button class="btn-login" onclick="cambiarContraseña()">Cambiar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://carpiteriapp-backend.vercel.app';
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || '{}');

        if (token && user.email) {
            mostrarApp();
            checkUsage();
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                mostrarError('loginError', 'Completa email y contraseña');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarError('loginError', data.error || 'Error en login');
                    return;
                }

                token = data.token;
                user = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));

                mostrarApp();
                checkUsage();
            } catch (error) {
                mostrarError('loginError', 'Error de conexión');
            }
        }

        function mostrarApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').textContent = user.nombre;
            document.getElementById('userPlan').textContent = 'Plan: Pago Único (20/día)';
        }

        async function checkUsage() {
            try {
                const response = await fetch(`${API_URL}/api/usage/check`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) return;

                const data = await response.json();
                user.usosHoy = data.usosHoy;
                user.usosRestantes = data.usosRestantes;

                document.getElementById('usosHoy').textContent = `${user.usosHoy}/20`;
                document.getElementById('usosRestantes').textContent = user.usosRestantes;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message || user.usosRestantes <= 0) return;

            const messagesDiv = document.getElementById('chatMessages');
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="message-content">${escapeHtml(message)}</div>`;
            messagesDiv.appendChild(userMsg);
            input.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.innerHTML = '<div class="message-content">⏳ Cargando...</div>';
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch(`${API_URL}/api/claude/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message })
                });

                loadingDiv.remove();

                if (!response.ok) {
                    const error = await response.json();
                    const botMsg = document.createElement('div');
                    botMsg.className = 'message bot';
                    botMsg.innerHTML = `<div class="message-content">❌ ${error.error}</div>`;
                    messagesDiv.appendChild(botMsg);
                    return;
                }

                const data = await response.json();

                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.innerHTML = `<div class="message-content">${data.response.replace(/\n/g, '<br>')}</div>`;
                messagesDiv.appendChild(botMsg);

                user.usosHoy = (user.usosHoy || 0) + 1;
                user.usosRestantes = data.usosRestantes;
                document.getElementById('usosHoy').textContent = `${user.usosHoy}/20`;
                document.getElementById('usosRestantes').textContent = user.usosRestantes;

                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (error) {
                loadingDiv.remove();
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.innerHTML = `<div class="message-content">❌ Error: ${error.message}</div>`;
                messagesDiv.appendChild(botMsg);
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        function abrirCambiarPass() {
            document.getElementById('modalCambiarPass').classList.add('active');
        }

        function cerrarModal() {
            document.getElementById('modalCambiarPass').classList.remove('active');
        }

        async function cambiarContraseña() {
            const actual = document.getElementById('passActual').value;
            const nueva = document.getElementById('passNueva').value;
            const confirmar = document.getElementById('passConfirm').value;

            if (!actual || !nueva || !confirmar) {
                mostrarError('cambiarPassError', 'Completa todos los campos');
                return;
            }

            if (nueva !== confirmar) {
                mostrarError('cambiarPassError', 'Las contraseñas no coinciden');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/auth/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ passwordActual: actual, passwordNueva: nueva })
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarError('cambiarPassError', data.error);
                    return;
                }

                alert('✅ Contraseña cambiada');
                cerrarModal();
                document.getElementById('passActual').value = '';
                document.getElementById('passNueva').value = '';
                document.getElementById('passConfirm').value = '';
            } catch (error) {
                mostrarError('cambiarPassError', 'Error: ' + error.message);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.reload();
        }

        function mostrarError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
